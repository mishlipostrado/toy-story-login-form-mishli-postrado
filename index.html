<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy Story Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <img src="images/logo.png" class="logo">

    <!-- SIGN UP -->
    <form id="signupForm">
        <h2>Create Account</h2>

        <input type="email" id="signupEmail" placeholder="Enter Email">
        <small>Email must include @ and domain (e.g., user@email.com)</small>

        <input type="password" id="signupPassword" placeholder="Create Password">
        <small>Password must be at least 6 characters</small>

        <button type="submit">Create Account</button>
        <p id="signupMessage"></p>

        <p class="switch">Already have an account?
            <span onclick="showLogin()">Sign In</span>
        </p>
    </form>

    <form id="loginForm" style="display:none;">
        <h2>Sign In</h2>

        <input type="email" id="loginEmail" placeholder="Enter Email">
        <input type="password" id="loginPassword" placeholder="Enter Password">

        <button type="submit">Login</button>
        <p id="loginMessage"></p>

        <p class="switch">No account?
            <span onclick="showSignup()">Create one</span>
        </p>
    </form>

</div>

<script src="script.js"></script>
</body>
</html>
